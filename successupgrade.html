<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExameScan | Upgrade Realizado</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #3B82F6;
            --bg: #050505;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 50% at 50% 0%, rgba(59,130,246,0.14) 0%, transparent 65%),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(59,130,246,0.06) 0%, transparent 60%);
            pointer-events: none;
            animation: drift 16s ease-in-out infinite alternate;
        }

        @keyframes drift {
            from { transform: scale(1) translate(0, 0); }
            to   { transform: scale(1.1) translate(1%, 3%); }
        }

        .card {
            position: relative;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            max-width: 420px;
            width: calc(100% - 2rem);
            text-align: center;
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 15%; right: 15%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(59,130,246,0.6), transparent);
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(32px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .icon-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            position: relative;
            animation: iconIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        @keyframes iconIn {
            from { opacity: 0; transform: scale(0.5); }
            to   { opacity: 1; transform: scale(1); }
        }

        .icon-bg {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(59,130,246,0.12);
            border: 1px solid rgba(59,130,246,0.25);
            animation: pulse 3s ease-in-out infinite;
        }

        .icon-ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 1px solid rgba(59,130,246,0.1);
            animation: pulse 3s ease-in-out infinite 0.4s;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50%       { opacity: 0.15; transform: scale(1.1); }
        }

        .check-svg {
            position: relative;
            z-index: 1;
            width: 36px;
            height: 36px;
        }

        .check-svg path {
            fill: none;
            stroke: var(--primary);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 40;
            stroke-dashoffset: 40;
            animation: draw 0.55s ease forwards 0.7s;
        }

        @keyframes draw { to { stroke-dashoffset: 0; } }

        h1 {
            font-size: 1.65rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.2;
            margin-bottom: 0.75rem;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
        }

        p {
            color: #9CA3AF;
            font-size: 0.9rem;
            line-height: 1.7;
            margin-bottom: 2.25rem;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px 20px;
            background: var(--primary);
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 4px 20px rgba(59,130,246,0.28);
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
        }

        .btn:hover {
            background: #2563EB;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(59,130,246,0.4);
        }

        .btn:active { transform: translateY(0); }

        .btn svg {
            width: 16px;
            height: 16px;
            transition: transform 0.25s ease;
        }

        .btn:hover svg { transform: translateX(3px); }

        .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 10; overflow: hidden; }
    </style>
</head>
<body>

    <div class="confetti-wrap" id="cw"></div>

    <div class="card">
        <div class="icon-wrap">
            <div class="icon-bg"></div>
            <div class="icon-ring"></div>
            <svg class="check-svg" viewBox="0 0 36 36" fill="none">
                <path d="M8 18l7 7 13-14"/>
            </svg>
        </div>

        <h1>Upgrade realizado!</h1>
        <p>Seu plano foi atualizado com sucesso.<br>Aproveite todos os seus novos recursos.</p>

        <a href="/dashboard" class="btn">
            Voltar para o Dashboard
            
        </a>
    </div>

    <script>
        (function () {
            const wrap = document.getElementById('cw');
            const colors = ['#3B82F6','#60A5FA','#93C5FD','#2563EB','#BFDBFE','#fff'];

            setTimeout(() => {
                for (let i = 0; i < 70; i++) {
                    const el = document.createElement('div');
                    const size   = 5 + Math.random() * 6;
                    const left   = 15 + Math.random() * 70;
                    const delay  = Math.random() * 0.5;
                    const dur    = 1.8 + Math.random() * 1.6;
                    const drift  = (Math.random() - 0.5) * 140;
                    const rot    = 200 + Math.random() * 400;
                    const color  = colors[Math.floor(Math.random() * colors.length)];
                    const isCircle = Math.random() > 0.6;
                    const uid    = 'f' + i;

                    const kf = document.createElement('style');
                    kf.textContent = `@keyframes ${uid}{0%{opacity:1;transform:translateY(0) translateX(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) translateX(${drift}px) rotate(${rot}deg)}}`;
                    document.head.appendChild(kf);

                    el.style.cssText = `
                        position:absolute;
                        top:-12px;
                        left:${left}%;
                        width:${isCircle ? size : size * 1.8}px;
                        height:${size}px;
                        background:${color};
                        border-radius:${isCircle ? '50%' : '2px'};
                        animation:${uid} ${dur}s ${delay}s ease-in forwards;
                    `;

                    wrap.appendChild(el);
                    setTimeout(() => el.remove(), (delay + dur + 0.3) * 1000);
                }
            }, 500);
        })();
    </script>
</body>
</html>
