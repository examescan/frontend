<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>ExameScan | Recuperar Senha</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root {
  --bg:#050505;
  --primary:#3B82F6;
}

body {
  font-family: "Plus Jakarta Sans", sans-serif;
  background: linear-gradient(135deg,#050505,#080a0f,#050505);
  color:white;
  min-height:100vh;
}

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(16px);
  border:1px solid rgba(255,255,255,0.1);
}

input {
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  color:white;
}

input:focus {
  outline:none;
  border-color: var(--primary);
  box-shadow:0 0 0 2px rgba(59,130,246,.3);
}

#toast-container {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index:9999;
}

.toast {
  min-width:280px;
  padding:14px 20px;
  border-radius:16px;
  background:#1e1e24;
  border-left:4px solid;
  margin-bottom:8px;
  opacity:0;
  transform:translateY(-10px);
  transition:.3s;
  font-weight:600;
}

.toast.show {opacity:1; transform:translateY(0);}
.toast-success {border-color:#22c55e;color:#22c55e;}
.toast-error {border-color:#ef4444;color:#ef4444;}

.loader {
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,.2);
  border-top:2px solid #3B82F6;
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin {100%{transform:rotate(360deg)}}
</style>
</head>

<body class="flex items-center justify-center p-4">

<div id="toast-container"></div>

<div class="glass p-8 rounded-[2rem] w-full max-w-md text-center shadow-2xl relative">

  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-1 bg-blue-500 blur-xl"></div>

  <h1 class="text-3xl font-extrabold mb-2 text-blue-400">ExameScan</h1>
  <p class="text-gray-400 text-sm mb-8">Recuperação de senha</p>

  <div class="space-y-4 text-left">
    <div>
      <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest ml-1">E-mail</label>
      <input id="email" type="email" placeholder="nome@email.com"
        class="w-full p-4 rounded-xl text-sm mt-1">
    </div>

    <button id="btnSubmit" onclick="sendForgotPassword()"
      class="w-full bg-blue-600 hover:bg-blue-500 p-4 rounded-xl font-bold mt-4 transition-all shadow-lg shadow-blue-900/30 flex items-center justify-center gap-2">
      <span id="btnText">Enviar link de recuperação</span>
      <div id="btnLoader" class="loader hidden"></div>
    </button>

    <div class="text-center mt-6">
      <a href="/dashboard" class="text-[11px] text-gray-500 hover:text-blue-400 transition">
        Voltar
      </a>
    </div>
  </div>

</div>

<script>
const API_URL = "https://doc-interpret-926187447831.europe-west1.run.app"; // <-- altere aqui

function notify(msg,type){
  const container=document.getElementById("toast-container");
  const toast=document.createElement("div");
  toast.className=`toast toast-${type}`;
  toast.innerText=msg;
  container.appendChild(toast);
  setTimeout(()=>toast.classList.add("show"),50);
  setTimeout(()=>{
    toast.classList.remove("show");
    setTimeout(()=>toast.remove(),300);
  },3500);
}

function setLoading(state){
  document.getElementById("btnLoader").classList.toggle("hidden",!state);
  document.getElementById("btnText").innerText = state ? "Enviando..." : "Enviar link de recuperação";
  document.getElementById("btnSubmit").disabled = state;
}

async function sendForgotPassword(){
  const email=document.getElementById("email").value.trim();

  if(!email){
    notify("Informe seu e-mail","error");
    return;
  }

  if(!email.includes("@")){
    notify("E-mail inválido","error");
    return;
  }

  setLoading(true);

  try{
    const res = await fetch(API_URL + "/api/auth/forgot-password",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if(!res.ok){
      throw new Error(data.message || "Erro ao solicitar recuperação");
    }

    notify("E-mail enviado com sucesso! Verifique sua caixa de entrada.","success");
    document.getElementById("email").value="";

  }catch(err){
    notify(err.message || "Erro inesperado","error");
  }finally{
    setLoading(false);
  }
}
</script>

</body>
</html>
