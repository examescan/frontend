<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="/favicon-inject.js"></script>
    <title>ExameScan | Upgrade Realizado</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-T747X8KP');</script>
    <!-- End Google Tag Manager -->

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #3B82F6;
            --bg: #050505;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: #fff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 50% at 50% 0%, rgba(59,130,246,0.14) 0%, transparent 65%),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(59,130,246,0.06) 0%, transparent 60%);
            pointer-events: none;
            animation: drift 16s ease-in-out infinite alternate;
        }

        @keyframes drift {
            from { transform: scale(1) translate(0, 0); }
            to   { transform: scale(1.1) translate(1%, 3%); }
        }

        .card {
            position: relative;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            padding: 3rem 2.5rem;
            max-width: 420px;
            width: calc(100% - 2rem);
            text-align: center;
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 15%; right: 15%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(59,130,246,0.6), transparent);
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(32px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .icon-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            position: relative;
            animation: iconIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
        }

        @keyframes iconIn {
            from { opacity: 0; transform: scale(0.5); }
            to   { opacity: 1; transform: scale(1); }
        }

        .icon-bg {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(59,130,246,0.12);
            border: 1px solid rgba(59,130,246,0.25);
            animation: pulse 3s ease-in-out infinite;
        }

        .icon-ring {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 1px solid rgba(59,130,246,0.1);
            animation: pulse 3s ease-in-out infinite 0.4s;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50%       { opacity: 0.15; transform: scale(1.1); }
        }

        .check-svg {
            position: relative;
            z-index: 1;
            width: 36px;
            height: 36px;
        }

        .check-svg path {
            fill: none;
            stroke: var(--primary);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 40;
            stroke-dashoffset: 40;
            animation: draw 0.55s ease forwards 0.7s;
        }

        @keyframes draw { to { stroke-dashoffset: 0; } }

        h1 {
            font-size: 1.65rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.2;
            margin-bottom: 0.75rem;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
        }

        p {
            color: #9CA3AF;
            font-size: 0.9rem;
            line-height: 1.7;
            margin-bottom: 2.25rem;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px 20px;
            background: var(--primary);
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 4px 20px rgba(59,130,246,0.28);
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.6s both;
        }

        .btn:hover {
            background: #2563EB;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(59,130,246,0.4);
        }

        .btn:active { transform: translateY(0); }

        .btn svg {
            width: 16px;
            height: 16px;
            transition: transform 0.25s ease;
        }

        .btn:hover svg { transform: translateX(3px); }

        .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 10; overflow: hidden; }
    </style>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T747X8KP"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <!-- Cookie Consent Banner (fallback) -->
    <div id="cookie-banner" style="
        display:none; position:fixed; bottom:24px; left:50%;
        transform:translateX(-50%) scale(0.96); z-index:99999;
        width:calc(100% - 40px); max-width:420px;
        background:rgba(10,10,15,0.96); backdrop-filter:blur(32px);
        border:1px solid rgba(255,255,255,0.08); border-radius:28px;
        padding:32px 28px 28px;
        box-shadow:0 40px 80px rgba(0,0,0,0.7);
        animation:cookieIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
        font-family:'Plus Jakarta Sans',sans-serif; text-align:center;
    ">
        <h3 style="font-size:1.05rem;font-weight:800;color:#fff;letter-spacing:-0.03em;margin-bottom:16px;">Sua privacidade importa</h3>
        <div style="width:52px;height:52px;border-radius:16px;margin:0 auto 18px;background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.25);display:flex;align-items:center;justify-content:center;color:#60a5fa;">
            <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
            </svg>
        </div>
        <p style="font-size:0.82rem;color:#6b7280;line-height:1.7;margin-bottom:24px;">
            Usamos cookies para melhorar sua experiência e analisar o uso do site.
            <a href="/termosdeuso#privacidade" target="_blank" style="color:#60a5fa;text-decoration:none;font-weight:600;">Política de Privacidade</a>.
        </p>
        <button onclick="cookieAceitar()" style="width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:0.875rem;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(59,130,246,0.35);">
            Aceitar e continuar
        </button>
    </div>
    <style>
        @keyframes cookieIn {
            from { opacity:0; transform:translateX(-50%) translateY(16px) scale(0.96); }
            to   { opacity:1; transform:translateX(-50%) translateY(0) scale(1); }
        }
    </style>

    <div class="confetti-wrap" id="cw"></div>

    <div class="card">
        <div class="icon-wrap">
            <div class="icon-bg"></div>
            <div class="icon-ring"></div>
            <svg class="check-svg" viewBox="0 0 36 36" fill="none">
                <path d="M8 18l7 7 13-14"/>
            </svg>
        </div>

        <h1>Upgrade realizado!</h1>
        <p>Seu plano foi atualizado com sucesso.<br>Aproveite todos os seus novos recursos.</p>

        <a href="/dashboard" class="btn">
            Voltar para o Dashboard
            
        </a>
    </div>

    <script>
        (function () {
            const wrap = document.getElementById('cw');
            const colors = ['#3B82F6','#60A5FA','#93C5FD','#2563EB','#BFDBFE','#fff'];

            setTimeout(() => {
                for (let i = 0; i < 70; i++) {
                    const el = document.createElement('div');
                    const size   = 5 + Math.random() * 6;
                    const left   = 15 + Math.random() * 70;
                    const delay  = Math.random() * 0.5;
                    const dur    = 1.8 + Math.random() * 1.6;
                    const drift  = (Math.random() - 0.5) * 140;
                    const rot    = 200 + Math.random() * 400;
                    const color  = colors[Math.floor(Math.random() * colors.length)];
                    const isCircle = Math.random() > 0.6;
                    const uid    = 'f' + i;

                    const kf = document.createElement('style');
                    kf.textContent = `@keyframes ${uid}{0%{opacity:1;transform:translateY(0) translateX(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) translateX(${drift}px) rotate(${rot}deg)}}`;
                    document.head.appendChild(kf);

                    el.style.cssText = `
                        position:absolute;
                        top:-12px;
                        left:${left}%;
                        width:${isCircle ? size : size * 1.8}px;
                        height:${size}px;
                        background:${color};
                        border-radius:${isCircle ? '50%' : '2px'};
                        animation:${uid} ${dur}s ${delay}s ease-in forwards;
                    `;

                    wrap.appendChild(el);
                    setTimeout(() => el.remove(), (delay + dur + 0.3) * 1000);
                }
            }, 500);
        })();

        // ── GTM + Conversões ─────────────────────────────────────────────

        function carregarGTM() {
            if (window._gtmLoaded) return;
            window._gtmLoaded = true;
            (function(w,d,s,l,i){
                w[l]=w[l]||[];
                w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});
                var f=d.getElementsByTagName(s)[0],
                j=d.createElement(s),
                dl=l!='dataLayer'?'&l='+l:'';
                j.async=true;
                j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;
                f.parentNode.insertBefore(j,f);
            })(window,document,'script','dataLayer','GTM-T747X8KP');
        }

        function cookieAceitar() {
            localStorage.setItem('cookie_consent', 'all');
            document.getElementById('cookie-banner').style.display = 'none';
            iniciarConversao();
        }

        function iniciarConversao() {
            carregarGTM();

            // Lê parâmetros da URL
            const params  = new URLSearchParams(window.location.search);
            const plan    = params.get('plan');   // '1' = essencial, '2' = pro
            const period  = params.get('period'); // 'month' ou 'year'

            // Mapa de planos e valores
            const nomes  = { '1': 'essencial', '2': 'pro' };
            const valores = {
                '1': { month: 39,  year: 348  },
                '2': { month: 79,  year: 708  }
            };

            const nomePlano  = nomes[plan]   || `plano_${plan}`;
            const periodo    = period === 'year' ? 'anual' : 'mensal';
            const valor      = valores[plan]?.[period] ?? 0;

            // Dispara evento de conversão pro GTM
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({
                event:       'assinatura_confirmada',
                plano:        nomePlano,
                periodo:      periodo,
                valor:        valor,
                currency:     'BRL',
                event_label: `${nomePlano}_${periodo}`
            });
        }

        // Verifica consentimento antes de disparar
        (function() {
            const consent = localStorage.getItem('cookie_consent');
            if (consent === 'all') {
                iniciarConversao();
            } else {
                // Tenta via JWT
                const savedToken = sessionStorage.getItem('token');
                if (savedToken) {
                    try {
                        const decoded = JSON.parse(atob(savedToken.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
                        if (decoded.terms_accepted) {
                            localStorage.setItem('cookie_consent', 'all');
                            iniciarConversao();
                            return;
                        }
                    } catch(e) {}
                }
                // Sem consentimento — mostra banner
                document.getElementById('cookie-banner').style.display = 'block';
            }
        })();
    </script>
</body>
</html>
