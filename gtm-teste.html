<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste GTM</title>

  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-T747X8KP');</script>
  <!-- End Google Tag Manager -->

  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 80px auto; text-align: center; }
    button { padding: 14px 28px; margin: 10px; font-size: 16px; cursor: pointer; border: none; border-radius: 6px; }
    .btn-cadastro  { background: #4CAF50; color: white; }
    .btn-plano-pro { background: #2196F3; color: white; }
    .btn-plano-basic { background: #FF9800; color: white; }
    #log { margin-top: 30px; padding: 16px; background: #f4f4f4; border-radius: 6px; text-align: left; font-size: 13px; }
  </style>
</head>
<body>

  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T747X8KP"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <h1>Página de Teste GTM</h1>
  <p>Clique nos botões abaixo e observe os eventos no painel do GTM (modo Visualizar)</p>

  <button class="btn-cadastro" onclick="dispararEvento('criar_conta', 'Criar Conta')">
    Criar Conta
  </button>

  <button class="btn-plano-pro" onclick="dispararEvento('assinar_pro_mensal', 'Pro Mensal - R$99')">
    Assinar Pro Mensal
  </button>

  <button class="btn-plano-basic" onclick="dispararEvento('assinar_basic_mensal', 'Basic Mensal - R$49')">
    Assinar Basic Mensal
  </button>

  <div id="log"><strong>Log de eventos:</strong><br><br>Nenhum evento disparado ainda.</div>

  <script>
    function dispararEvento(nomeEvento, label) {
      // Dispara o evento pro GTM
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({
        event: nomeEvento,
        label: label
      });

      // Mostra no log da página
      const log = document.getElementById('log');
      const hora = new Date().toLocaleTimeString();
      log.innerHTML += `✅ <strong>${hora}</strong> — evento disparado: <code>${nomeEvento}</code><br>`;

      console.log('dataLayer push:', nomeEvento);
    }
  </script>

</body>
</html>
